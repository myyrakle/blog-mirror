apiVersion: v1
kind: Secret
metadata:
  name: blog-mirror-secret
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:password@postgres-host:5432/blog_mirror"
  NAVER_BLOG_ID: "your_naver_blog_id"
  GITHUB_REPO_PATH: "/data/blog"
  GITHUB_REMOTE_URL: "https://github.com/username/blog.git"
  GITHUB_USERNAME: "your_github_username"
  GITHUB_TOKEN: "ghp_your_personal_access_token"
  CRAWL_DELAY_MS: "1500"

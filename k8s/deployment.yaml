apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-mirror
  namespace: default
  labels:
    app: blog-mirror
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-mirror
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: blog-mirror
    spec:
      containers:
        - name: blog-mirror
          image: myyrakle/blog-mirror:v0.1.1
          imagePullPolicy: Always
          args: ["sync-loop", "--interval", "3600"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          envFrom:
            - secretRef:
                name: blog-mirror-secret
          volumeMounts:
            - name: blog-repo
              mountPath: /data/blog
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: blog-repo
          hostPath:
            # Replace with the host path where the GitHub Pages repo is cloned.
            path: /path/to/blog-mirror-clone
            type: Directory
      restartPolicy: Always
